summary: >
  Client reviewed the working prototype. Overall positive reaction. Two major
  issues raised: (1) the apartment count input was a dropdown limited to
  10/20/30/50 — client has a building with 28 apartments, none of the options
  fit; (2) client introduced a "property manager" who handles day-to-day
  operations and needs their own view. Client also asked whether rent
  collection could happen through the app. Monthly income column on the
  dashboard was confirmed as essential.
