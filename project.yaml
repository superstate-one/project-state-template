summary: >
  A property management platform for real estate investors who own multiple
  buildings. Investors track portfolio performance, manage buildings and
  apartments, collect rent, and monitor cashflow — all in one place. The
  platform replaces spreadsheets and disconnected tools with a unified,
  role-aware dashboard. A property manager role handles day-to-day operations
  on behalf of investors.
