id: property-manager
name: Property Manager
description: >
  Staff member or contractor who handles day-to-day operations on behalf of
  an investor. Manages individual buildings, collects rent, handles tenant
  communications, and escalates issues. Does not have visibility into investor
  financials or cross-portfolio data.
goals:
  - See all buildings they are responsible for
  - Record rent payments and flag overdue tenants
  - Log maintenance requests and track resolution
pain-points:
  - Relies on phone calls and spreadsheets to report to investor
  - No structured record of maintenance history per apartment
technical-skill: medium
frequency-of-use: daily
provenance:
  - date: 2026-04-22
    source: feedback/2026-04-22-prototype-review
    note: >
      Client introduced this role during prototype review; was not in scope
      for the initial meeting. Investor said "my manager handles the daily
      stuff, they need their own view."
