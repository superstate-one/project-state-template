id: investor
name: Real Estate Investor
description: >
  Individual or entity owning one or more buildings, focused on portfolio
  performance and ROI rather than day-to-day operations. Typically reviews
  dashboards weekly and delegates maintenance tasks to a property manager.
goals:
  - Track portfolio performance at a glance
  - Understand cashflow per building and per apartment
  - Decide where to invest next based on occupancy and return data
  - Onboard new buildings without manual data entry overhead
pain-points:
  - Spreadsheets break as portfolio grows beyond five buildings
  - No unified view across properties managed by different people
  - Rent collection is manual and error-prone
technical-skill: low
frequency-of-use: weekly
representative-personas:
  - id: persona-jane
    name: Jane (composite — example persona)
    inferred: true
    one-line-summary: Cautious older investor, owns 4 buildings, distrusts new software
    background: >
      This is an illustrative persona attached to the example investor role.
      Replace or delete when the real client's investor users are described.
    technical-comfort:
      level: low
      avoids: mobile-only apps, unfamiliar SaaS products
    motivations:
      primary: Stable rental income
    anti-goals:
      - Will not give credit card details to a new service
    behavioral-tics:
      - Reads every label before clicking
      - Pastes from Excel frequently
    test-implications:
      - Test paste-from-Excel paths
      - Test confirmation dialogs for clarity
      - Test error messages for comprehensibility at low technical skill
    quotes: []
provenance:
  - date: 2026-04-09
    source: feedback/2026-04-09-first-meeting
    note: Client described their own workflow; owns 12 buildings across Sofia
