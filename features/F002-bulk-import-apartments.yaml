id: F002
title: Bulk import apartments into a building
status: approved
priority: must-have
description: >
  An investor or property manager can add many apartments to a building at once
  without entering each one manually. Supports optional CSV upload for apartment
  details. If no CSV is provided, the system generates placeholder apartments
  based on the building's apartment count.
roles: [investor, property-manager]
related-entities: [building, apartment]
related-rules: [R001]
acceptance-criteria:
  - User can trigger bulk import from the building detail page
  - User can optionally upload a CSV file with apartment details
  - CSV must support columns: unit-number, floor, bedrooms, monthly-rent
  - If no CSV, system generates N placeholder apartments where N = building.apartment-count
  - Inline preview shows parsed apartments before confirming
  - User can cancel at the preview step without saving
  - Upload errors (bad format, missing required columns) show a clear actionable message
edge-cases:
  - 28 apartments (non-round number)
  - 500+ apartments in one import
  - 1 apartment
  - CSV with special characters in unit-number (e.g., "2B", "Apt-14A")
  - CSV missing the bedrooms column (should default to null, not reject)
  - CSV with inconsistent line endings (Windows vs Unix)
ui-notes: >
  Two-step flow: upload or skip → preview table → confirm. Progress indicator
  during parsing for large files. Row-level error highlighting in the preview.
backend-notes: >
  Stream CSV parsing server-side. Validate each row individually. Return
  per-row errors without failing the entire batch.
open-questions: [Q007]
provenance:
  - date: 2026-04-09
    source: feedback/2026-04-09-first-meeting
    note: Client mentioned buildings of various sizes, including non-round numbers
  - date: 2026-04-22
    source: feedback/2026-04-22-prototype-review
    note: >
      Client called out dropdown limit problem; rule R001 added. Property manager
      role added to this feature after client introduced PM role.
